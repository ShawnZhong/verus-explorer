# Unlocks `#![feature(...)]` on stable — required because the vendored
# `third_party/rust/compiler/rustc_*` crates use unstable feature gates, while
# rust-toolchain.toml pins stable 1.94.0 for Verus. `CFG_RELEASE` is normally
# injected by rustc's bootstrap; `rustc_span` embeds it via `env!()` as a
# symbol for version-gated attribute checks.
[env]
RUSTC_BOOTSTRAP = "1"
# Must match the patched stage1 rustc's self-reported version (the host rustc
# in target/host-rust/, see `rustc -vV`). Sysroot rmetas built by that rustc
# (scripts/build-wasm-{sysroot,vir}.sh, scripts/build-host-verus.sh) get stamped with
# its baked-in version; the in-wasm rustc compiled here picks up these envs
# at compile time via `env!()`/`option_env!()` and bakes the same string in,
# so rmeta version checks (E0514) line up. x.py builds without a configured
# channel default to `1.94.0-dev`; if we ever rebuild the patched rustc with
# `[rust] channel = "stable"` in third_party/rust/config.toml, update these
# to match what the new binary reports.
CFG_RELEASE = "1.94.0-dev"
CFG_VERSION = "1.94.0-dev"
CFG_RELEASE_CHANNEL = "dev"
# rustc_interface bakes this path into the binary to find the sysroot-relative
# rustc bin. Unused on wasm32 (no sysroot), but `env!()` is a compile-time
# failure unless set.
RUSTC_INSTALL_BINDIR = "bin"
# rustc's idea of "the host triple" — the platform it runs on. Normally
# baked in by x.py; for us, rustc runs inside the wasm sandbox.
# rustc_session::config::host_tuple() panics if this is missing.
CFG_COMPILER_HOST_TRIPLE = "wasm32-unknown-unknown"

# `-z stack-size=64MiB` reserves 64 MB of stack at module-instantiate
# time (set by rust-lld in the wasm linear memory layout; unused bytes
# cost nothing thanks to zero-page mapping). Sized for two load-bearing
# callers that each assumed huge native stacks:
#   * rustc — its `run_in_thread_with_globals` normally spawns a
#     thread with an 8 MiB stack, but our wasm patch runs it inline;
#     HIR lowering overflows at the wasm default (1 MiB).
#   * Verus' VIR interpreter (`vir/src/interpreter.rs`) — originally
#     spawned a 1 GiB-stack thread for `compute` mode spec evaluation;
#     wasm32 has no threads, so our patch runs it inline on the main
#     stack. Deep recursion in `eval_expr` (spec-function unfolding,
#     recursive datatype traversal) can blow the stack on nontrivial
#     proofs, which is what drove this bump from 8 → 64 MiB.
# Browsers allow hundreds of MiB of wasm memory, so 64 MiB is a
# comfortable fit with headroom to grow if needed.
# `./scripts/rustc-wrapper.sh` injects a profile-aware
# `-L .../wasm32-unknown-unknown/<profile>/deps` for wasm32 builds so
# rustc finds rustc-rlibs' output. Kept out of rustflags below because
# config.toml can't select per-profile values — hardcoding both
# `debug/deps` and `release/deps` triggers E0464 once both dirs exist.
#
# `--allow=unexpected_cfgs` blanket-silences the lint across the vendored
# rustc tree (whose source carries `#[cfg(bootstrap)]` and similar attrs
# that `x.py` would normally declare via its own check-cfg config). We
# accept losing the lint workspace-wide rather than maintaining a
# `[workspace.lints]` table plus matching `[lints] workspace = true` blocks
# in third_party/rust/compiler/{rustc_macros,rustc_fluent_macro}/Cargo.toml.
# Cargo doesn't merge `[build].rustflags` with `[target.<triple>].rustflags`
# (the higher-priority table wins), so the flag is repeated below for wasm32.
[build]
rustc-wrapper = "./scripts/rustc-wrapper.sh"
# Consolidate workspace artifacts under target/cargo/ so they sit alongside
# target/host-rust/, target/host-verus/, and target/wasm-z3/ — see Makefile.
target-dir = "target/cargo"
rustflags = ["--allow=unexpected_cfgs"]

[target.wasm32-unknown-unknown]
rustflags = [
    "--allow=unexpected_cfgs",
    "-C", "link-arg=-zstack-size=67108864",
    # Miri pulls in `getrandom 0.3`, which on wasm32-unknown-unknown
    # requires both the `custom` feature (set in rustc-rlibs/Cargo.toml)
    # and this cfg so the crate's backend dispatch routes through our
    # `__getrandom_v03_custom` stub in `verus-explorer/src/wasm.rs`
    # rather than firing its `compile_error!` for the unsupported target.
    "--cfg=getrandom_backend=\"custom\"",
]
