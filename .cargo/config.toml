# Unlocks `#![feature(...)]` on stable â€” required because the vendored
# `third_party/rust/compiler/rustc_*` crates use unstable feature gates, while
# rust-toolchain.toml pins stable 1.94.0 for Verus. `CFG_RELEASE` is normally
# injected by rustc's bootstrap; `rustc_span` embeds it via `env!()` as a
# symbol for version-gated attribute checks.
[env]
RUSTC_BOOTSTRAP = "1"
CFG_RELEASE = "1.94.0"
# Baked into each rmeta's header; rustc rejects rmetas whose stamp doesn't
# match `rustc $CFG_VERSION`. Must match what stable 1.94.0 (the toolchain
# pinned in `rust-toolchain.toml`) self-reports via `rustc --version`. Update
# together with `rust-toolchain.toml`.
CFG_VERSION = "1.94.0 (4a4ef493e 2026-03-02)"
# rustc_metadata checks `env!("CFG_RELEASE_CHANNEL") == "dev"` for a diagnostic
# hint about missing std. "stable" matches what 1.94.0 release builds use.
CFG_RELEASE_CHANNEL = "stable"
# rustc_interface bakes this path into the binary to find the sysroot-relative
# rustc bin. Unused on wasm32 (no sysroot), but `env!()` is a compile-time
# failure unless set.
RUSTC_INSTALL_BINDIR = "bin"
# rustc's idea of "the host triple" â€” the platform it runs on. Normally
# baked in by x.py; for us, rustc runs inside the wasm sandbox.
# rustc_session::config::host_tuple() panics if this is missing.
CFG_COMPILER_HOST_TRIPLE = "wasm32-unknown-unknown"

# getrandom 0.3 refuses to compile on wasm32-unknown-unknown without an explicit
# backend cfg (it doesn't assume `Math.random` / `crypto.getRandomValues`).
# `wasm_js` routes to `crypto.getRandomValues` via wasm-bindgen; we also need
# `getrandom = { features = ["wasm_js"] }` as a direct dep in Cargo.toml so the
# crate is built with the backend's JS bindings compiled in.
#
# `-z stack-size=8MiB` matches rustc's own 8 MiB thread stack â€” our wasm
# `run_in_thread_with_globals` patch runs `run_compiler` inline on the main
# thread, so we need the linker to reserve the stack at module level. With
# the wasm default (1 MiB) HIR lowering overflows into "memory access out of
# bounds".
# `./scripts/rustc-wrapper.sh` injects a profile-aware
# `-L .../wasm32-unknown-unknown/<profile>/deps` for wasm32 builds so
# rustc finds rustc-rlibs' output. Kept out of rustflags below because
# config.toml can't select per-profile values â€” hardcoding both
# `debug/deps` and `release/deps` triggers E0464 once both dirs exist.
[build]
rustc-wrapper = "./scripts/rustc-wrapper.sh"
# Consolidate workspace artifacts under target/cargo/ so they sit alongside
# target/host-rust/, target/host-verus/, and target/wasm-z3/ â€” see Makefile.
target-dir = "target/cargo"

[target.wasm32-unknown-unknown]
rustflags = [
    "--cfg=getrandom_backend=\"wasm_js\"",
    # Declares `cfg(bootstrap)` so `#[cfg(bootstrap)]` attrs across the
    # vendored rustc tree don't trip the `unexpected_cfgs` lint.
    # `bootstrap` is set by rustc's x.py when stage0-building rustc with
    # the previous stable compiler; we build with plain cargo, so it's
    # always unset and those attrs are silent no-ops. The two host-only
    # proc-macro crates (`rustc_macros`, `rustc_fluent_macro`) carry the
    # same declaration in their own Cargo.toml under `[lints.rust]` â€”
    # Cargo's stable rustflags tables don't cover host compilations when
    # `--target` is passed on the command line (that would require the
    # unstable `-Z host-config` / `-Z target-applies-to-host` flags).
    "--check-cfg=cfg(bootstrap)",
    "-C", "link-arg=-zstack-size=8388608",
]
