[package]
name = "verus-explorer"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
vir = { path = "third_party/verus/source/vir" }
air = { path = "third_party/verus/source/air" }
sise = "0.6.0"
wasm-bindgen = "0.2"

# rust-analyzer front-end — path deps into the vendored submodule at
# third_party/rust-analyzer. Only the crates actually named in `use`
# statements are declared here; base-db / hir-def / hir-ty / vfs / span
# come in transitively through these.
base-db     = { path = "third_party/rust-analyzer/crates/base-db" }
cfg         = { path = "third_party/rust-analyzer/crates/cfg" }
hir         = { path = "third_party/rust-analyzer/crates/hir" }
hir-expand  = { path = "third_party/rust-analyzer/crates/hir-expand" }
ide-db      = { path = "third_party/rust-analyzer/crates/ide-db" }
paths       = { path = "third_party/rust-analyzer/crates/paths" }
span        = { path = "third_party/rust-analyzer/crates/span" }
syntax      = { path = "third_party/rust-analyzer/crates/syntax" }
vfs         = { path = "third_party/rust-analyzer/crates/vfs" }
triomphe    = "0.1"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1

# wasm-pack's default wasm-opt pass (-O ≈ -O3) is slow on a binary this size;
# -O1 is several times faster with a small size/perf regression.
[package.metadata.wasm-pack.profile.release]
wasm-opt = ['-O1']
