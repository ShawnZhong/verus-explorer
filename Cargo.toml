[package]
name = "verus-explorer"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
vir = { path = "third_party/verus/source/vir" }
air = { path = "third_party/verus/source/air" }
rust_verify = { path = "third_party/verus/source/rust_verify" }
wasm-bindgen = "0.2"
# rustc_* crates that this crate uses directly are not declared here — they
# are produced as rlibs by `rustc-rlibs/` and resolved at link time via
# `-L dependency=...` (set in `.cargo/config.toml`). See `src/lib.rs` for
# the corresponding `extern crate rustc_*;` declarations.

# Force getrandom 0.3's `wasm_js` feature on so its wasm32 backend compiles —
# see the companion `.cargo/config.toml` rustflag. `rand` (pulled in by
# rustc_abi) transitively depends on this.
[target.wasm32-unknown-unknown.dependencies]
getrandom = { version = "0.3", features = ["wasm_js"] }

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1

# Pulling in the whole rustc frontend makes the unoptimized wasm+debuginfo
# bundle big enough that rust-lld SIGSEGVs during `make dev`. Dropping
# debuginfo keeps the linker happy without giving up dev-build speed.
[profile.dev]
debug = 0

# wasm-pack's default wasm-opt pass (-O ≈ -O3) is slow on a binary this size;
# -O1 is several times faster with a small size/perf regression.
[package.metadata.wasm-pack.profile.release]
wasm-opt = ['-O1']
