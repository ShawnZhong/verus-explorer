[package]
name = "verus-explorer"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
vir = { path = "third_party/verus/source/vir" }
air = { path = "third_party/verus/source/air" }
sise = "0.6.0"
wasm-bindgen = "0.2"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1

# wasm-pack's default wasm-opt pass (-O ≈ -O3) is slow on a binary this size;
# -O1 is several times faster with a small size/perf regression.
[package.metadata.wasm-pack.profile.release]
wasm-opt = ['-O1']
