<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>verus-explorer</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>

  <header>
    <h1>
      <span><a href="https://shawnzhong.github.io/verus-explorer/">Verus Explorer</a> <span class="muted">Every stage of Verus, from source to solver, running live as wasm in your browser.</span></span>
      <a class="header-link" href="https://github.com/ShawnZhong/verus-explorer" target="_blank" rel="noopener">GitHub</a>
    </h1>
  </header>

  <main id="workbench">
    <section class="pane" id="left-pane">
      <div class="pane-header">
        <label class="hint muted">
          Example:
          <select id="example-select"></select>
        </label>
      </div>
      <div id="parse-input"></div>
      <div id="parse-meta"></div>
      <div class="controls">
        <button id="parse-run" disabled>
          <span id="parse-run-label">Loading verifier…</span>
          <kbd class="shortcut">⌘↵</kbd>
        </button>
        <label class="hint muted" title="Re-verify 800ms after each edit">
          <input type="checkbox" id="auto-verify" /> Rerun on edit
        </label>
        <label class="hint muted" title="Run expand-errors after a failed query to pinpoint which sub-conjunct breaks (slower)">
          <input type="checkbox" id="expand-errors" /> Diagnostics
        </label>
      </div>
    </section>

    <section class="pane" id="right-pane">
      <div class="output-tabs" id="parse-tabs" role="tablist"></div>
      <div class="output-subtabs" id="parse-subtabs" role="tablist"></div>
      <div id="parse-output-view"></div>
    </section>
  </main>

  <!-- Emscripten MODULARIZE output: defines globalThis.initZ3(config).
       Lives under ./z3/ so wasm-pack's post-build wasm-opt pass (which
       scans every top-level *.wasm in its --out-dir) doesn't try to
       re-optimize z3.wasm and abort on its exception-handling tags. -->
  <script src="./z3/z3.js"></script>

  <script type="module">
    // CodeMirror 6 bundle, built by `make dev` (see the `$(DIST)/editor.js`
    // Makefile target). All CM6 imports flow through this one file; the
    // export list lives in `editor/editor-src.js`.
    import {
      EditorView, basicSetup, keymap, indentWithTab, rust, oneDark,
      Decoration, StateField, StateEffect, EditorState,
      linter, setDiagnostics,
      search,
      Compartment, StreamLanguage, foldService, foldEffect,
    } from './editor.js';

    // wasm-libs bundle: rustc-in-wasm resolves `extern crate core/alloc/vstd`
    // against rmetas laid out at `/virtual/lib/rustlib/wasm32-unknown-unknown/lib`.
    // `build.rs` stages each file gzipped as `${name}.gz` under `./wasm-libs/`;
    // we fetch each `.gz` and pipe through the native `DecompressionStream`
    // (gzip is supported in all evergreen browsers; brotli isn't yet), then
    // re-install into every fresh wasm instance via `wasm_libs_add_file` +
    // `wasm_libs_finalize`. The names below are the uncompressed filenames
    // rustc's crate locator expects in memory, *not* what's on the wire.
    const WASM_LIBS = [
      'liballoc.rmeta',
      'libcompiler_builtins.rmeta',
      'libcore.rmeta',
      'libverus_builtin.rmeta',
      'libverus_builtin_macros.rmeta',
      'libverus_state_machines_macros.rmeta',
      'libvstd.rmeta',
      'vstd.vir',
    ];

    // Z3 init, the verus wasm compile, and the wasm-libs fetch+decompress
    // are independent; fire them all off at once. Critical cold-load time
    // = max(them), not sum. Emscripten resolves z3.wasm relative to z3.js
    // by default, so no locateFile callback is needed.
    const ms = (t) => `${(performance.now() - t).toFixed(0)}ms`;
    const coldStart = performance.now();
    const timed = (label, p) => {
      const t = performance.now();
      return p.then(v => { console.log(`[cold] ${label}: ${ms(t)}`); return v; });
    };
    const [Z3, verusModule, wasmLibs] = await Promise.all([
      timed('initZ3', globalThis.initZ3()),
      timed('compile verus', WebAssembly.compileStreaming(fetch('./verus_explorer_bg.wasm'))),
      timed('fetch+decompress wasm-libs', Promise.all(WASM_LIBS.map(async name => {
        const res = await fetch(`./wasm-libs/${name}.gz`);
        const stream = res.body.pipeThrough(new DecompressionStream('gzip'));
        const buf = await new Response(stream).arrayBuffer();
        return [name, new Uint8Array(buf)];
      }))),
    ]);
    console.log(`[cold] total: ${ms(coldStart)} (wasm-libs uncompressed = ${(wasmLibs.reduce((s, [,b]) => s + b.byteLength, 0) / 1e6).toFixed(1)} MB)`);

    // Bridge Rust <-> emscripten Z3: air/src/smt_process.rs declares these as
    // wasm-bindgen externs, so each must be a plain JS function on globalThis.
    globalThis.Z3_mk_config = Z3.cwrap('Z3_mk_config', 'number', []);
    globalThis.Z3_mk_context = Z3.cwrap('Z3_mk_context', 'number', ['number']);
    globalThis.Z3_del_config = Z3.cwrap('Z3_del_config', null, ['number']);
    globalThis.Z3_del_context = Z3.cwrap('Z3_del_context', null, ['number']);
    // `Z3_eval_smtlib2_string` returns the solver's textual reply (`sat` /
    // `unsat` / errors / model output) for each batch of SMT commands sent
    // from the AIR driver. The AIR log writers capture *input* SMT-LIB2 but
    // the replies are otherwise opaque; tee them into `z3ResponseBuffer`
    // here so `runParse` can stash the transcript as a 'Z3' section.
    const z3Eval = Z3.cwrap('Z3_eval_smtlib2_string', 'string', ['number', 'string']);
    let z3ResponseBuffer = [];
    globalThis.Z3_eval_smtlib2_string = (ctx, query) => {
      const reply = z3Eval(ctx, query);
      z3ResponseBuffer.push(reply);
      return reply;
    };

    // One wasm instance, reused for every `parse_source` call. Each
    // `run_compiler` builds its own Session+CStore; nothing leaks across
    // calls (confirmed by `tests/smoke.rs`). V8 JIT + rustc LazyLock entries
    // survive across calls and amortize, so #2/#3 run at ~2× #1 speed.
    const t0 = performance.now();
    const verus = await import('./verus_explorer.js');
    const t1 = performance.now();
    await verus.default({ module_or_path: verusModule });
    const t2 = performance.now();
    for (const [name, bytes] of wasmLibs) verus.wasm_libs_add_file(name, bytes);
    const t3 = performance.now();
    verus.wasm_libs_finalize();
    const t4 = performance.now();
    console.log(
      `[init] import=${(t1 - t0).toFixed(0)}ms ` +
      `instantiate=${(t2 - t1).toFixed(0)}ms ` +
      `add_file×${wasmLibs.length}=${(t3 - t2).toFixed(0)}ms ` +
      `finalize=${(t4 - t3).toFixed(0)}ms ` +
      `total=${(t4 - t0).toFixed(0)}ms`
    );

    // ------------------------------------------------------------------
    // DOM refs + tiny state
    // ------------------------------------------------------------------
    const parseButton = document.getElementById('parse-run');
    const parseButtonLabel = document.getElementById('parse-run-label');
    const parseMeta = document.getElementById('parse-meta');
    const parseTabsEl = document.getElementById('parse-tabs');
    const parseSubtabsEl = document.getElementById('parse-subtabs');
    const parseOutputViewEl = document.getElementById('parse-output-view');
    const exampleSelect = document.getElementById('example-select');
    const autoVerifyCheckbox = document.getElementById('auto-verify');
    const expandErrorsCheckbox = document.getElementById('expand-errors');

    // Example manifest: grouped by topic so the dropdown reads as a mini
    // table of contents. Each `items` entry drives one `<option>`; the
    // `group` label renders as a native `<optgroup>` header. `file` names
    // a source file under `public/examples/` (copied to `dist/examples/`
    // by the Makefile). Add an entry here to add a new example — no other
    // wiring needed. The first entry also doubles as the cold-load default
    // when no URL hash is present.
    const EXAMPLE_GROUPS = [
      { group: 'Tutorial', items: [
        { file: 'arith.rs', label: 'Arithmetic' },
        { file: 'requires_ensures.rs', label: 'Requires / ensures' },
        { file: 'collections.rs', label: 'Seq / Set / Map' },
        { file: 'loop.rs', label: 'Loop invariant' },
        { file: 'recursion.rs', label: 'Recursive spec fn' },
        { file: 'struct_invariant.rs', label: 'Struct + ghost binding' },
      ]},
      { group: 'Test (expected failures)', items: [
        { file: 'failure.rs', label: 'assert(false)' },
        { file: 'precondition_fail.rs', label: 'Precondition violation' },
      ]},
    ];
    const EXAMPLES = EXAMPLE_GROUPS.flatMap(g => g.items);
    for (const { group, items } of EXAMPLE_GROUPS) {
      const og = document.createElement('optgroup');
      og.label = group;
      for (const { file, label } of items) {
        const opt = document.createElement('option');
        opt.value = file;
        opt.textContent = label;
        og.appendChild(opt);
      }
      exampleSelect.appendChild(og);
    }
    const fetchExample = (file) => fetch(`./examples/${file}`).then(r => r.text());
    // Output panel has two levels of navigation: a top tab strip picks the
    // pipeline stage (Verus / HIR / VIR / AIR / Z3), and a subtab row under
    // the CM6 view picks the variant within that stage (raw / SSA / flat
    // for AIR, in / out for Z3, …). Collapsing sub-variants into a second
    // row keeps the top strip fitting on one line and groups related IRs
    // head-to-head. Groups with a single variant render no subtab row.
    //
    // Stage blurbs: `Verus` is the source-level AST (post-macro-expansion).
    // `HIR` is rustc's high-level IR. The `VIR-*` family all lives in the
    // `vir` crate: `VIR` is the AST form, `VIR-sst` is after
    // `ast_to_sst_krate` (statement / expression trees closer to SMT),
    // `VIR-poly` is after the `poly` pass (generics monomorphized / type-
    // erased — what AIR consumes). AIR has three: initial block tree,
    // SSA-versioned, flattened to one assertion. `Z3-in` is what we send
    // to the solver; `Z3-out` is its reply — both SMT-LIB2.
    const TAB_GROUPS = [
      { id: 'Verus',  variants: ['AST_PRE', 'AST'] },
      { id: 'HIR',    variants: ['HIR'] },
      { id: 'VIR',    variants: ['VIR', 'SST_AST', 'SST_POLY'] },
      { id: 'AIR',    variants: ['AIR_INITIAL', 'AIR_MIDDLE', 'AIR_FINAL'] },
      { id: 'Z3-in',  variants: ['SMT'] },
      { id: 'Z3-out', variants: ['Z3'] },
    ];
    const VARIANT_LABEL = {
      AST_PRE: 'raw', AST: 'expanded',
      HIR: 'HIR',
      VIR: 'ast', SST_AST: 'sst', SST_POLY: 'poly',
      AIR_INITIAL: 'raw', AIR_MIDDLE: 'SSA', AIR_FINAL: 'flat',
      SMT: 'Z3-in', Z3: 'Z3-out',
    };
    // Flat section order + section → group lookup, both derived from
    // TAB_GROUPS so adding a new variant is a one-line change.
    const SECTION_ORDER = TAB_GROUPS.flatMap(g => g.variants);
    const GROUP_OF = new Map(TAB_GROUPS.flatMap(g => g.variants.map(v => [v, g.id])));
    // Remembers the last subtab the user clicked in each group, so
    // clicking back into (say) `VIR` returns to `VIR-sst` if that's where
    // they left it rather than snapping back to the first variant.
    const lastVariantInGroup = new Map();

    // "Show vstd" toggle: by default the VIR tab's three variants show
    // only user-owned items (Rust side runs `prune_krate_to_user` /
    // `prune_krate_sst_to_user` at dump time — verification itself still
    // sees everything). When the checkbox is on, we swap the section
    // lookup to the `_FULL` twin that Rust emits alongside, which pretty-
    // prints the whole krate including vstd. Pure dump filter — no
    // re-verify needed. Map declares the variants that have a twin.
    const VIR_FULL_SECTION = {
      VIR: 'VIR_FULL', SST_AST: 'SST_AST_FULL', SST_POLY: 'SST_POLY_FULL',
    };
    let showVstd = false;
    const sectionFor = (tab) =>
      (showVstd && VIR_FULL_SECTION[tab]) ? VIR_FULL_SECTION[tab] : tab;

    // `parse_source` always produces every IR; bodies are cached here so
    // flipping a tab just swaps the output-view's doc instead of re-parsing.
    const sectionCache = new Map();
    let verdictCache = null;
    const diagnosticCache = [];
    // Which IR the output view currently shows; preserved across runParse
    // calls so the user doesn't lose their tab selection on every edit.
    // Null until the first successful parse; `renderTabs` picks a default.
    let currentTab = null;
    // Per-tab scroll position for the output viewer, so flipping between
    // tabs (or re-running verification on the same tab) returns to where
    // the user was reading. Kept live by a `scroll` listener on the
    // viewer's scrollDOM, below; restored in `renderOutputView`.
    const tabScrolls = new Map();

    // ------------------------------------------------------------------
    // Error-line decoration in the source editor. A StateField holds a
    // RangeSet of `Decoration.line({ class: 'cm-error-line' })` positions;
    // `setErrorLines` rebuilds it on every parse so stale marks from a
    // prior run clear before new ones land. `decoration.map(tr.changes)`
    // keeps existing marks following edits until the next parse refreshes.
    // ------------------------------------------------------------------
    const setErrorLines = StateEffect.define();
    const errorLineField = StateField.define({
      create: () => Decoration.none,
      update(deco, tr) {
        deco = deco.map(tr.changes);
        for (const e of tr.effects) {
          if (e.is(setErrorLines)) deco = Decoration.set(e.value, true);
        }
        return deco;
      },
      provide: f => EditorView.decorations.from(f),
    });
    const errorLineDeco = Decoration.line({ attributes: { class: 'cm-error-line' } });
    const warningLineDeco = Decoration.line({ attributes: { class: 'cm-warning-line' } });

    // Rustc's `HumanEmitter` prefixes each top-level diagnostic with the
    // level name: `error[E0432]:`, `error:`, `warning:`, `note:`, `help:`.
    // We key off that first token to pick severity. Anything we don't
    // recognize (rare — e.g., a Verus-side message without the prefix)
    // falls through as an error so it stays visible in red.
    const severity = (msg) => {
      const m = msg.trimStart().match(/^(error|warning|note|help)\b/);
      if (!m) return 'error';
      if (m[1] === 'note' || m[1] === 'help') return 'note';
      return m[1];
    };

    // ------------------------------------------------------------------
    // Renderers
    // ------------------------------------------------------------------
    // Pull a `line:col` out of a rustc diagnostic so we can make it clickable
    // *and* surface it as a source-editor line mark. The `--> file:N:M` form
    // is rustc's canonical span marker; fallback to any `N:M` occurrence
    // covers formats that don't carry an arrow (e.g., Verus-side errors).
    // Only the first match is used.
    const extractLoc = (msg) => {
      const m = msg.match(/-->\s*\S*?:(\d+):(\d+)/) ?? msg.match(/:(\d+):(\d+)/);
      return m ? { line: parseInt(m[1], 10), col: parseInt(m[2], 10) } : null;
    };

    // Jump the source editor to the span a diagnostic points at and flash
    // the line so the eye catches the move. Caller is responsible for
    // passing a (line, col) pair that's already bounds-checked against the
    // current doc.
    const jumpToLoc = (loc) => {
      const doc = view.state.doc;
      if (loc.line < 1 || loc.line > doc.lines) return;
      const lineInfo = doc.line(loc.line);
      const pos = Math.min(lineInfo.from + Math.max(0, loc.col - 1), lineInfo.to);
      view.dispatch({
        selection: { anchor: pos },
        effects: EditorView.scrollIntoView(pos, { y: 'center' }),
      });
      view.focus();
      // Temporary line-background flash so the user sees *which* line the
      // list item jumped to even when the cursor is off-screen. Reuses the
      // errorLineField StateField by overlaying a short-lived decoration
      // then clearing back to the post-parse set after a beat.
      const flash = Decoration.line({ attributes: { class: 'cm-diag-flash' } }).range(lineInfo.from);
      view.dispatch({ effects: setErrorLines.of([flash]) });
      setTimeout(() => updateErrorDecorations(), 600);
    };

    // Under the verdict we list each diagnostic as its own block. Messages
    // whose line:col we can parse become clickable — click jumps the source
    // editor to that span and opens the matching inline-lint tooltip,
    // giving the bottom list and the in-editor squiggle a shared hand-off
    // point (useful for expand-errors notes that span many lines).
    const renderMeta = () => {
      parseMeta.textContent = '';
      if (verdictCache !== null) {
        const [headline, ...rest] = verdictCache.split('\n');
        const isOk = headline === 'verified';
        const div = document.createElement('div');
        div.className = `verdict ${isOk ? 'ok' : 'bad'}`;
        const status = document.createElement('div');
        status.className = `verdict-status ${isOk ? 'ok' : 'bad'}`;
        status.textContent = isOk ? '✓ verified' : `✗ ${headline}`;
        div.appendChild(status);
        const detail = rest.join('\n').trim();
        if (detail) {
          const d = document.createElement('div');
          d.className = 'verdict-detail';
          d.textContent = detail;
          div.appendChild(d);
        }
        parseMeta.appendChild(div);
      }
      for (const msg of diagnosticCache) {
        const pre = document.createElement('pre');
        pre.className = `diagnostic ${severity(msg)}`;
        pre.textContent = msg;
        const loc = extractLoc(msg);
        if (loc && loc.line >= 1 && loc.line <= view.state.doc.lines) {
          pre.classList.add('clickable');
          pre.addEventListener('click', () => jumpToLoc(loc));
        }
        parseMeta.appendChild(pre);
      }
    };

    // Top tab strip: one button per pipeline stage. A group is enabled as
    // long as *any* of its variants has produced output. Clicking a group
    // restores the last-visited variant within it (or falls back to the
    // first cached one) so flipping away and back doesn't lose context.
    // Stages not yet cached render as disabled buttons so the full pipeline
    // shape stays visible during cold load / between runs.
    const renderTabs = () => {
      parseTabsEl.textContent = '';
      const currentGroup = currentTab ? GROUP_OF.get(currentTab) : null;
      const cached = (v) => sectionCache.has(sectionFor(v));
      for (const g of TAB_GROUPS) {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'tab' + (g.id === currentGroup ? ' active' : '');
        button.textContent = g.id;
        button.disabled = !g.variants.some(cached);
        button.addEventListener('click', () => {
          const chosen = (lastVariantInGroup.has(g.id) && cached(lastVariantInGroup.get(g.id)))
            ? lastVariantInGroup.get(g.id)
            : g.variants.find(cached);
          if (!chosen) return;
          currentTab = chosen;
          lastVariantInGroup.set(g.id, chosen);
          renderTabs();
          renderSubtabs();
          renderOutputView();
        });
        parseTabsEl.appendChild(button);
      }
    };

    // Subtab row under the output CM6 view: picks the variant within the
    // active group (e.g., raw / SSA / flat for AIR). Hidden entirely when
    // the current group has only one variant (Verus, HIR) so the row
    // doesn't eat vertical space without offering a choice.
    // Subtab row: sits right under the top tab bar, above the CM6 view.
    // Holds two kinds of children, separated visually by `margin-left:
    // auto` on the control block so pills hug the left edge and controls
    // hug the right:
    //   1. Variant pills — one per sibling section in the active group
    //      (e.g., `ast` / `sst` / `poly` under VIR). Skipped when the
    //      group has a single variant.
    //   2. Group-level controls — currently only VIR's `Show vstd`
    //      toggle, which swaps `sectionFor()` between pruned and full
    //      twins (both cached per run, no re-verify).
    // Row is hidden entirely when empty (`.output-subtabs:empty`) so
    // tabs with no variants and no controls don't leave a dead band.
    const renderSubtabs = () => {
      parseSubtabsEl.textContent = '';
      const currentGroup = currentTab ? GROUP_OF.get(currentTab) : null;
      if (!currentGroup) return;
      const group = TAB_GROUPS.find(g => g.id === currentGroup);
      if (group.variants.length > 1) {
        for (const v of group.variants) {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'subtab' + (v === currentTab ? ' active' : '');
          button.textContent = VARIANT_LABEL[v];
          button.disabled = !sectionCache.has(sectionFor(v));
          button.addEventListener('click', () => {
            currentTab = v;
            lastVariantInGroup.set(currentGroup, v);
            renderTabs();
            renderSubtabs();
            renderOutputView();
          });
          parseSubtabsEl.appendChild(button);
        }
      }
      if (currentGroup === 'VIR') {
        const label = document.createElement('label');
        label.className = 'tab-control hint muted';
        label.title = 'Include vstd items in the VIR / VIR-sst / VIR-poly dumps';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = showVstd;
        cb.addEventListener('change', () => {
          showVstd = cb.checked;
          renderTabs();
          renderSubtabs();
          renderOutputView();
        });
        label.appendChild(cb);
        label.appendChild(document.createTextNode(' Show vstd'));
        parseSubtabsEl.appendChild(label);
      }
    };

    // Minimal s-expression stream parser for the AIR / SMT / Z3 tabs.
    // Groups SMT-LIB tokens into a handful of CM6 tag buckets so the
    // theme can give each its own color: commands & connectives →
    // keyword, built-in sorts → typeName, booleans → atom, arithmetic /
    // comparison / bitvec / string / array ops → operator, `:foo`
    // attribute keywords → attributeName. Unknown tokens fall through
    // as plain identifiers.
    const SMT_KEYWORDS = new Set([
      // commands
      'assert', 'check-sat', 'check-sat-assuming',
      'declare-const', 'declare-fun', 'declare-sort',
      'declare-datatype', 'declare-datatypes', 'declare-rel', 'declare-var',
      'define-const', 'define-fun', 'define-fun-rec', 'define-funs-rec', 'define-sort',
      'push', 'pop', 'reset', 'reset-assertions',
      'set-option', 'set-logic', 'set-info',
      'get-info', 'get-model', 'get-value', 'get-option',
      'get-assertions', 'get-assignment', 'get-proof',
      'get-unsat-core', 'get-unsat-assumptions',
      'exit', 'echo', 'simplify', 'eval', 'help', 'labels', 'display',
      'rule', 'query',
      // connectives, quantifiers, binders
      'and', 'or', 'not', 'xor', '=>', 'iff', 'ite', 'distinct',
      'forall', 'exists', 'let', 'match', 'par', 'as', '!',
    ]);
    const SMT_SORTS = new Set([
      'Bool', 'Int', 'Real', 'String', 'Array', 'BitVec', 'Seq', 'RegLan',
    ]);
    const SMT_OPERATORS = new Set([
      // arithmetic / comparison
      '=', '<', '>', '<=', '>=', '+', '-', '*', '/', 'div', 'mod', 'abs', 'rem',
      'to_real', 'to_int', 'is_int',
      // array
      'select', 'store',
      // bitvec
      'concat', 'extract', 'bvcomp', 'zero_extend', 'sign_extend', 'repeat',
      'rotate_left', 'rotate_right',
      'bvadd', 'bvsub', 'bvmul', 'bvudiv', 'bvurem', 'bvsdiv', 'bvsrem', 'bvsmod',
      'bvshl', 'bvlshr', 'bvashr',
      'bvand', 'bvor', 'bvxor', 'bvnot', 'bvneg', 'bvnand', 'bvnor', 'bvxnor',
      'bvult', 'bvule', 'bvugt', 'bvuge', 'bvslt', 'bvsle', 'bvsgt', 'bvsge',
      // string
      'str.len', 'str.++', 'str.at', 'str.substr', 'str.indexof', 'str.contains',
      'str.prefixof', 'str.suffixof', 'str.replace', 'str.to_int', 'str.from_int',
    ]);
    // Token-classifier factory: same whitespace / comment / string /
    // number / paren / `|quoted|` / `:attr` handling for every sexp-ish
    // dialect, but the keyword/sort/operator sets differ between SMT
    // (lowercase commands like `declare-fun`) and VIR/SST (CamelCase
    // node kinds like `Function`, `BinaryOp`, `Int`).
    const makeSexpParser = (name, kw, sorts, ops) => ({
      name,
      startState: () => ({}),
      token(stream) {
        if (stream.eatSpace()) return null;
        const ch = stream.peek();
        if (ch === ';') { stream.skipToEnd(); return 'comment'; }
        if (ch === '"') {
          stream.next();
          while (!stream.eol()) {
            const c = stream.next();
            if (c === '\\') { stream.next(); continue; }
            if (c === '"') break;
          }
          return 'string';
        }
        // SMT-LIB allows arbitrary characters inside `|...|` — eat to
        // the closing bar so internal whitespace / parens don't break
        // tokenization.
        if (ch === '|') {
          stream.next();
          while (!stream.eol()) { if (stream.next() === '|') break; }
          return 'variableName';
        }
        if (ch === '(' || ch === ')') { stream.next(); return 'bracket'; }
        if (/[0-9]/.test(ch)) { stream.eatWhile(/[\w.]/); return 'number'; }
        stream.eatWhile(/[^\s()"';|]/);
        const w = stream.current();
        // `:foo` is an SMT-LIB attribute keyword (`:named`, `:pattern`,
        // `:weight`, …). Render distinctly from command keywords.
        if (w.startsWith(':')) return 'attributeName';
        if (w === 'true' || w === 'false') return 'atom';
        if (kw.has(w)) return 'keyword';
        if (sorts.has(w)) return 'typeName';
        if (ops.has(w)) return 'operator';
        return null;
      },
    });
    const sexpLanguage = StreamLanguage.define(
      makeSexpParser('sexp', SMT_KEYWORDS, SMT_SORTS, SMT_OPERATORS),
    );
    // VIR / SST pretty-prints look like s-expressions but the heads are
    // Verus's own CamelCase node kinds (see `vir/src/printer.rs`, `sst.rs`).
    // We split them into the same keyword / typeName / operator buckets
    // the SMT parser uses, so the theme colors stay consistent.
    const VIR_KEYWORDS = new Set([
      // top-level items
      'Function', 'Datatype', 'Trait', 'TraitImpl', 'Module', 'Variant', 'Field',
      // statement / expr forms
      'Stmt', 'Expr', 'Block', 'Decl', 'LocalDecl', 'Param', 'Arm', 'Pattern',
      'Let', 'If', 'IfElse', 'Match', 'Loop', 'While', 'Break', 'Continue', 'Return',
      'Call', 'Assign', 'Var', 'Const', 'Ctor', 'Tuple', 'Array', 'Index', 'Cast',
      'Lambda', 'Closure', 'Bind', 'Binding', 'Choose', 'Old', 'WithExpr',
      'FieldUpdate', 'IsVariant', 'Quant', 'Forall', 'Exists', 'Multi',
      // clauses / specs
      'Requires', 'Ensures', 'Decreases', 'Recommends', 'Invariant',
      'LoopInvariant', 'Assert', 'Assume', 'DecreasesBy', 'CheckDecreaseHeight',
      'OpenInvariantMask', 'RevealGroup', 'PostConditionKind', 'UnwindSst',
    ]);
    const VIR_MODES = new Set([
      'Spec', 'Proof', 'Exec', 'Ghost', 'Tracked',
      'Public', 'Private', 'Open', 'Closed',
      'Uninterpreted', 'FnDef', 'SpecFn',
    ]);
    const VIR_TYPES = new Set([
      'Bool', 'Int', 'Nat', 'Real', 'Float', 'String', 'Char',
      'BitVector', 'BitVec', 'USize', 'ISize',
      'Boxed', 'Unboxed', 'Sized', 'TypeId', 'TypParam', 'Named', 'Fun',
      'Primitive', 'Decorate', 'MutRef', 'Dyn', 'Opaque',
      'AnonymousClosure', 'PointeeMetadata', 'Projection',
      'ConstInt', 'ConstBool',
    ]);
    const VIR_OPERATORS = new Set([
      // arithmetic / comparison
      'Add', 'Sub', 'Mul', 'Div', 'Mod', 'Neg',
      'EuclideanDiv', 'EuclideanMod',
      'Le', 'Lt', 'Ge', 'Gt', 'Eq', 'Ne',
      // logical
      'And', 'Or', 'Xor', 'Not', 'Implies',
      // bitvec
      'BitAdd', 'BitSub', 'BitMul', 'BitUDiv', 'BitURem', 'BitSDiv', 'BitSRem',
      'BitAnd', 'BitOr', 'BitXor', 'BitNot', 'BitConcat',
      'BitExtract', 'BitZeroExtend', 'BitSignExtend',
      'Shl', 'Shr',
      // unary / conversion / float
      'Unary', 'Binary', 'Arith', 'RealArith', 'Bitwise',
      'Inequality', 'Chained',
      'IntToReal', 'RealToInt', 'FloatToBits',
      'IsZero', 'IsNaN', 'IsInfinite', 'IsNormal', 'IsSubnormal',
    ]);
    // Merge modes into the keyword bucket so they color the same as the
    // surrounding node-kind heads (they're effectively tags, not types).
    const VIR_KW_ALL = new Set([...VIR_KEYWORDS, ...VIR_MODES]);
    const virLanguage = StreamLanguage.define(
      makeSexpParser('vir', VIR_KW_ALL, VIR_TYPES, VIR_OPERATORS),
    );
    // Per-section language, looked up on every tab switch. Sections not
    // listed get `[]` (plain). Rust mode for AST/HIR since those are
    // pseudo-Rust pretty-prints; s-expressions for everything downstream
    // (VIR/SST also pretty-print as parenthesized trees, close enough).
    const LANGUAGE_FOR_SECTION = {
      AST_PRE: rust(), AST: rust(), HIR: rust(),
      VIR: virLanguage, SST_AST: virLanguage, SST_POLY: virLanguage,
      AIR_INITIAL: sexpLanguage, AIR_MIDDLE: sexpLanguage, AIR_FINAL: sexpLanguage,
      SMT: sexpLanguage, Z3: sexpLanguage,
    };
    // Compartment lets us hot-swap the output editor's language on tab
    // flips without re-creating the view (which would drop scroll + lose
    // the search panel's state).
    const outputLanguage = new Compartment();

    // Fold service for the SMT / AIR tabs. Two shapes are foldable:
    //   1. `(push)` / `(pop)` pairs — Verus wraps each check_valid in them
    //      (air/context.rs:429), so each query collapses to one line.
    //   2. `;; -- setup --` header — folds the preamble up to the line
    //      right before the first `(push)` so the (usually large) axiom /
    //      datatype setup can be hidden in one click. The setup marker
    //      comes from `split_setup_queries` in `src/lib.rs`.
    // basicSetup's foldGutter asks this service per line; non-foldable
    // lines return null. `renderOutputView` then auto-folds the setup
    // range on every tab switch so it starts collapsed by default.
    const sectionFold = foldService.of((state, lineStart, lineEnd) => {
      const head = state.doc.sliceString(lineStart, lineEnd);
      if (/^;; -- setup --\s*$/.test(head)) {
        const idx = state.doc.toString().indexOf('\n(push)', lineEnd);
        return idx < 0 ? null : { from: lineEnd, to: idx };
      }
      if (/^\(push\)\s*$/.test(head)) {
        let depth = 1;
        let pos = lineEnd;
        while (pos < state.doc.length) {
          const nextLine = state.doc.lineAt(pos + 1);
          const text = state.doc.sliceString(nextLine.from, nextLine.to);
          if (/^\s*\(push\)\s*$/.test(text)) depth++;
          else if (/^\s*\(pop\)\s*$/.test(text)) {
            depth--;
            if (depth === 0) return { from: lineEnd, to: nextLine.to };
          }
          if (nextLine.to >= state.doc.length) break;
          pos = nextLine.to;
        }
      }
      return null;
    });

    // Replace the read-only CM6 viewer's doc with the selected section body,
    // then restore the user's last scroll position for that tab (0 on first
    // visit). One long-lived view is cheaper than N-per-tab; the scroll map
    // is what buys back the "pick up where I left off" feel.
    const renderOutputView = () => {
      const key = currentTab ? sectionFor(currentTab) : null;
      const body = key && sectionCache.has(key) ? sectionCache.get(key) : '';
      outputView.dispatch({
        changes: { from: 0, to: outputView.state.doc.length, insert: body },
        effects: outputLanguage.reconfigure(LANGUAGE_FOR_SECTION[currentTab] ?? []),
      });
      // Auto-fold the `;; -- setup --` preamble so the tab opens focused
      // on the queries. Applies to every body produced by
      // `split_setup_queries` — SMT and all three AIR tabs. The whole-doc
      // replacement above wipes any prior fold state (folds over a
      // deleted range collapse to zero width), so we re-apply on every
      // render. If the body has no `(push)` (unreachable after the guard
      // in `split_setup_queries`, but defensive) or isn't an SMT/AIR
      // tab, nothing folds.
      const pushIdx = body.indexOf('\n(push)');
      if (body.startsWith(';; -- setup --') && pushIdx > 0) {
        outputView.dispatch({
          effects: foldEffect.of({ from: ';; -- setup --'.length, to: pushIdx }),
        });
      }
      outputView.scrollDOM.scrollTop = tabScrolls.get(currentTab) ?? 0;
    };

    // Build CM6 `Diagnostic` objects (the @codemirror/lint shape) from the
    // rustc diagnostic strings — one per message with a known line:col.
    // Yields the hover tooltip + squiggle underline in the editor, in sync
    // with the line-bg wash `updateErrorDecorations` applies.
    const buildInlineDiagnostics = () => {
      const doc = view.state.doc;
      const diags = [];
      for (const msg of diagnosticCache) {
        const loc = extractLoc(msg);
        if (!loc || loc.line < 1 || loc.line > doc.lines) continue;
        const lineInfo = doc.line(loc.line);
        // rustc emits `--> file:L:C` with a 1-based column; CM6 document
        // offsets are 0-based, so subtract one to line the squiggle up
        // under the character rustc's ^^^^^ caret points at.
        const from = Math.min(lineInfo.from + Math.max(0, loc.col - 1), lineInfo.to);
        diags.push({ from, to: lineInfo.to, severity: severity(msg), message: msg });
      }
      // CM6 requires diagnostics sorted by `from`.
      diags.sort((a, b) => a.from - b.from);
      view.dispatch(setDiagnostics(view.state, diags));
    };

    // Convert diagnostic locations into line decorations on the source
    // editor. Called post-parse so marks reflect the latest run; an edit
    // afterwards leaves them in place (mapped through the change) until
    // the next parse refreshes them.
    const updateErrorDecorations = () => {
      const doc = view.state.doc;
      // CM6 requires decorations fed into a set to be sorted by `from`.
      // Collect with the line `from` first, sort, then materialize the
      // correct decoration per severity. Error wins when the same line has
      // both an error and a warning — two line-bg decorations on one line
      // both render and the warning would visually layer over the error.
      const byLine = new Map();
      for (const msg of diagnosticCache) {
        const loc = extractLoc(msg);
        if (!loc || loc.line < 1 || loc.line > doc.lines) continue;
        const sev = severity(msg);
        if (sev === 'note') continue;
        const from = doc.line(loc.line).from;
        const prev = byLine.get(from);
        if (!prev || (prev === 'warning' && sev === 'error')) {
          byLine.set(from, sev);
        }
      }
      const decos = [...byLine.entries()]
        .sort(([a], [b]) => a - b)
        .map(([from, sev]) => (sev === 'error' ? errorLineDeco : warningLineDeco).range(from));
      view.dispatch({ effects: setErrorLines.of(decos) });
    };

    // ------------------------------------------------------------------
    // Rust → JS bridge. Synchronous during `parse_source`; JS is
    // single-threaded, so the DOM won't actually repaint between these
    // calls. On a mid-pipeline trap the buffered caches survive the
    // unwind and `finally`-time renderers flush what's there.
    // ------------------------------------------------------------------
    globalThis.verus_diagnostic = (msg) => { diagnosticCache.push(msg); };
    globalThis.verus_dump = (section, body) => {
      if (section === 'VERDICT') verdictCache = body;
      else sectionCache.set(section, body);
    };
    globalThis.verus_bench = (label, ms) => {
      console.log(`[stage] ${label}=${ms.toFixed(0)}ms`);
    };

    let runId = 0;
    const runParse = () => {
      const myRun = ++runId;
      parseButton.disabled = true;
      parseButtonLabel.textContent = 'Verifying…';
      sectionCache.clear();
      verdictCache = null;
      diagnosticCache.length = 0;
      z3ResponseBuffer = [];
      try {
        const tParse = performance.now();
        verus.parse_source(view.state.doc.toString(), expandErrorsCheckbox.checked);
        console.log(`[parse] parse_source=${(performance.now() - tParse).toFixed(0)}ms`);
      } catch (e) {
        if (myRun !== runId) return;
        if (diagnosticCache.length === 0 && sectionCache.size === 0 && verdictCache === null) {
          diagnosticCache.push('Parse crashed: ' + (e?.message ?? e));
          console.error(e);
        }
      } finally {
        if (myRun === runId) {
          parseButton.disabled = false;
          parseButtonLabel.textContent = 'Verify';
        }
      }
      // Z3 transcript lives on the JS side (wrapped cwrap), so it's installed
      // after `parse_source` returns rather than via `verus_dump`.
      if (z3ResponseBuffer.length) {
        sectionCache.set('Z3', z3ResponseBuffer.join('\n'));
      }
      // Preserve user's tab selection when it survives the new run;
      // otherwise default to Z3-in (the actual solver input — most useful
      // for debugging why a query failed) or whichever stage made it the
      // furthest if SMT wasn't reached.
      if (!currentTab || !sectionCache.has(currentTab)) {
        currentTab = sectionCache.has('SMT') ? 'SMT'
          : (SECTION_ORDER.find(n => sectionCache.has(n)) ?? null);
      }
      if (currentTab) lastVariantInGroup.set(GROUP_OF.get(currentTab), currentTab);
      renderMeta();
      renderTabs();
      renderSubtabs();
      renderOutputView();
      updateErrorDecorations();
      buildInlineDiagnostics();
    };

    // ------------------------------------------------------------------
    // URL hash persistence: gzip + base64url-encode the doc into
    // `location.hash` so a link captures the current source. Debounced at
    // 500ms so fast typing doesn't thrash `history.replaceState`.
    // CompressionStream is Safari 16.4+ / Chrome 80+ / Firefox 113+.
    // ------------------------------------------------------------------
    const b64urlEncode = (bytes) => {
      let s = '';
      for (const b of bytes) s += String.fromCharCode(b);
      return btoa(s).replaceAll('+', '-').replaceAll('/', '_').replace(/=+$/, '');
    };
    const b64urlDecode = (str) => {
      const padded = str.replaceAll('-', '+').replaceAll('_', '/')
        + '='.repeat((4 - str.length % 4) % 4);
      const bin = atob(padded);
      const out = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
      return out;
    };
    const encodeSrc = async (src) => {
      const bytes = new TextEncoder().encode(src);
      const stream = new Blob([bytes]).stream().pipeThrough(new CompressionStream('gzip'));
      const compressed = new Uint8Array(await new Response(stream).arrayBuffer());
      return b64urlEncode(compressed);
    };
    const decodeSrc = async (hash) => {
      const stream = new Blob([b64urlDecode(hash)]).stream().pipeThrough(new DecompressionStream('gzip'));
      return await new Response(stream).text();
    };
    let saveTimer;
    const scheduleHashSave = () => {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(async () => {
        try {
          const encoded = await encodeSrc(view.state.doc.toString());
          history.replaceState(null, '', '#' + encoded);
        } catch (e) { console.warn('hash save failed:', e); }
      }, 500);
    };

    // The dropdown's selected option doubles as a "this example is loaded
    // verbatim" indicator. On hash-load the editor holds whatever the user
    // shared, which may or may not be one of our examples — clear the
    // selection so the dropdown reads blank rather than lying about what's
    // in the editor.
    let loadedFromHash = false;
    const initialDoc = await (async () => {
      const hash = location.hash.slice(1);
      if (hash) {
        try {
          const src = await decodeSrc(hash);
          loadedFromHash = true;
          return src;
        } catch (e) { console.warn('hash decode failed:', e); }
      }
      return fetchExample(EXAMPLES[0].file);
    })();
    if (loadedFromHash) exampleSelect.selectedIndex = -1;

    // ------------------------------------------------------------------
    // Auto-verify: debounced re-run on edits when the checkbox is on.
    // Setting is persisted in localStorage so the preference survives a
    // reload. 800ms feels long enough that fast typing doesn't burn
    // verifier cycles but short enough that a brief pause fires a check.
    // ------------------------------------------------------------------
    const AUTO_VERIFY_KEY = 've-auto-verify';
    // Default on — unchecked only if the user has explicitly turned it off.
    autoVerifyCheckbox.checked = localStorage.getItem(AUTO_VERIFY_KEY) !== 'false';
    autoVerifyCheckbox.addEventListener('change', () => {
      localStorage.setItem(AUTO_VERIFY_KEY, autoVerifyCheckbox.checked);
      // Flipping the checkbox on is effectively a request to verify now —
      // the user just expressed "yes, I want verification running" — so
      // kick off a run. Flipping off is silent; we only cancel pending work.
      if (autoVerifyCheckbox.checked) runParse();
    });
    // Expand-errors: always default off — runs per-conjunct sub-queries on a
    // failed body, which doubles-to-triples verify time but pinpoints which
    // sub-assertion broke. Not persisted: starting clean each page load keeps
    // the slower path opt-in rather than sticky.
    expandErrorsCheckbox.checked = false;
    expandErrorsCheckbox.addEventListener('change', () => {
      // The flag is only read by `parse_source`, so a re-run is required to
      // see the effect — do it eagerly instead of waiting for the next edit
      // or manual Verify click.
      runParse();
    });
    let autoVerifyTimer;
    const scheduleAutoVerify = () => {
      clearTimeout(autoVerifyTimer);
      if (!autoVerifyCheckbox.checked) return;
      autoVerifyTimer = setTimeout(runParse, 800);
    };

    // ------------------------------------------------------------------
    // CM6 source editor. Mounted after runParse is defined so the
    // Mod-Enter keymap's closure resolves cleanly. `oneDark` only applied
    // when the user's system is in dark mode; everything else keys off
    // CSS vars.
    // ------------------------------------------------------------------
    const dark = matchMedia('(prefers-color-scheme: dark)').matches;
    const view = new EditorView({
      parent: document.getElementById('parse-input'),
      doc: initialDoc,
      extensions: [
        basicSetup,
        rust(),
        ...(dark ? [oneDark] : []),
        errorLineField,
        // Pin the search panel to the top so Cmd+F opens it in a spot that
        // isn't clipped by the flex container; basicSetup's searchKeymap
        // already binds Mod-f, we just need the panel installed.
        search({ top: true }),
        // No-op source — we push diagnostics directly via `setDiagnostics`
        // after each parse. The extension itself is what enables CM6's
        // hover-tooltip rendering of those diagnostics.
        linter(() => []),
        EditorView.updateListener.of(u => {
          if (u.docChanged) { scheduleHashSave(); scheduleAutoVerify(); }
        }),
        keymap.of([
          indentWithTab,
          { key: 'Mod-Enter', run: () => { runParse(); return true; } },
        ]),
      ],
    });

    // Second CM6 instance, read-only, hosts the selected IR stage's
    // output. `basicSetup` gets us line numbers + folding + search for
    // free, which matters when the SMT stage dump runs to thousands of
    // lines. `outputLanguage.of([])` reserves a language slot we swap
    // per tab via `renderOutputView`.
    const outputView = new EditorView({
      parent: parseOutputViewEl,
      doc: '',
      extensions: [
        basicSetup,
        search({ top: true }),
        outputLanguage.of([]),
        sectionFold,
        EditorState.readOnly.of(true),
        EditorView.editable.of(false),
        ...(dark ? [oneDark] : []),
      ],
    });
    // Keep `tabScrolls` in sync with live user scrolling. Fires on our
    // own programmatic `scrollTop = …` too, which just re-saves the value
    // we just wrote — idempotent, so no guard flag needed.
    outputView.scrollDOM.addEventListener('scroll', () => {
      if (currentTab) tabScrolls.set(currentTab, outputView.scrollDOM.scrollTop);
    });

    // ------------------------------------------------------------------
    // Wiring: example dropdown + Verify button.
    // ------------------------------------------------------------------
    exampleSelect.addEventListener('change', async () => {
      const src = await fetchExample(exampleSelect.value);
      view.dispatch({ changes: { from: 0, to: view.state.doc.length, insert: src } });
      runParse();
    });
    parseButton.addEventListener('click', runParse);

    // Cold-load done — flip the Verify button live.
    parseButtonLabel.textContent = 'Verify';
    parseButton.disabled = false;

    renderTabs();
    renderSubtabs();
    runParse();
  </script>

</body>

</html>
