<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>verus-explorer</title>
  <style>
    /* Single palette driven by CSS custom properties — one light set as
       root defaults, overridden in a `prefers-color-scheme: dark` media
       query. CM6 picks up its own `oneDark` theme via the script below,
       so the variables here only drive the surrounding chrome. */
    :root {
      --bg: #fff;
      --fg: #111;
      --muted: #666;
      --subtle: #888;
      --pre-bg: #f5f5f5;
      --border: #ddd;
      --border-soft: #e5e5e5;
      --ok-fg: #087a3c;
      --ok-bg: #ecfdf3;
      --ok-border: #abefc6;
      --bad-fg: #b42318;
      --bad-bg: #fdf2f2;
      --bad-border: #f5c2c0;
      --diag-bg: #fdf2f2;
      --diag-border: #b42318;
      --focus-ring: #4a9eff;
      --pill-bg: #f0f0f0;
      --pill-pending: #999;
      --pill-done-bg: #e3f7ec;
      --pill-done-fg: #087a3c;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a;
        --fg: #e0e0e0;
        --muted: #999;
        --subtle: #777;
        --pre-bg: #242424;
        --border: #333;
        --border-soft: #2a2a2a;
        --ok-fg: #3fb371;
        --ok-bg: #10291c;
        --ok-border: #2d5e3f;
        --bad-fg: #e07b75;
        --bad-bg: #2a1010;
        --bad-border: #5a2f2d;
        --diag-bg: #2a1010;
        --diag-border: #e07b75;
        --focus-ring: #6fb2ff;
        --pill-bg: #2a2a2a;
        --pill-pending: #666;
        --pill-done-bg: #10291c;
        --pill-done-fg: #3fb371;
      }
    }

    html, body {
      background: var(--bg);
      color: var(--fg);
    }
    body {
      font: 14px/1.45 ui-monospace, Menlo, Consolas, monospace;
      max-width: 1200px;
      margin: 1.5rem auto;
      padding: 0 1rem;
    }

    h1 {
      font-size: 1.25rem;
      margin: 0 0 .4em;
    }
    h1 a {
      color: inherit;
      text-decoration: none;
    }
    h1 a:hover {
      text-decoration: underline;
    }

    header p {
      margin: 0 0 1rem;
    }

    button {
      font: inherit;
      padding: .4em 1em;
      cursor: pointer;
      background: var(--bg);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 4px;
    }
    button:hover:not(:disabled) { border-color: var(--focus-ring); }
    button:disabled { cursor: not-allowed; opacity: .6; }

    select {
      font: inherit;
      padding: .2em .4em;
      background: var(--bg);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    .muted { color: var(--muted); }

    pre {
      background: var(--pre-bg);
      color: var(--fg);
      padding: .6em .8em;
      border-radius: 6px;
      overflow-x: auto;
      white-space: pre-wrap;
      margin: .2em 0;
      font-size: .85em;
    }

    pre.diagnostic {
      background: var(--diag-bg);
      border-left: 3px solid var(--diag-border);
    }
    pre.diagnostic.clickable {
      cursor: pointer;
    }
    pre.diagnostic.clickable:hover {
      outline: 1px solid var(--diag-border);
    }

    /* Split-pane workbench: editor on the left, output on the right.
       Each pane is a flex column that owns its own scroll; `min-height: 0`
       on the grid children is what lets the inner `overflow: auto` track
       work instead of the pane ballooning to fit content. Collapses to a
       single column under ~900px. */
    #workbench {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 1rem;
      height: calc(100vh - 9rem);
      min-height: 420px;
    }
    .pane {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .pane-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: .5em;
      margin-bottom: .4em;
      flex-wrap: wrap;
    }
    .pane-label {
      font-size: .8em;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--subtle);
    }
    #parse-input {
      flex: 1;
      min-height: 0;
      display: flex;
    }
    #parse-input .cm-editor {
      flex: 1;
      min-height: 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
    }
    #parse-input .cm-editor.cm-focused {
      outline: 2px solid var(--focus-ring);
      outline-offset: -2px;
    }
    #parse-input .cm-scroller {
      font-family: ui-monospace, Menlo, Consolas, monospace;
    }
    #parse-output-view {
      flex: 1;
      min-height: 0;
      display: flex;
    }
    #parse-output-view .cm-editor {
      flex: 1;
      min-height: 0;
      border: 1px solid var(--border);
      border-radius: 0 6px 6px 6px;
      font-size: 13px;
    }
    #parse-output-view .cm-scroller {
      font-family: ui-monospace, Menlo, Consolas, monospace;
    }
    /* Source-editor decoration: any line flagged by the diagnostic loc
       extractor gets a red wash so the user sees where the error lives
       without having to click into it. */
    .cm-error-line { background-color: var(--bad-bg); }
    @media (max-width: 900px) {
      #workbench {
        grid-template-columns: minmax(0, 1fr);
        height: auto;
        min-height: 0;
      }
      .pane { overflow: visible; }
      #parse-input .cm-editor { min-height: 14em; }
      #parse-output-view { min-height: 20em; }
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: .5em 1em;
      margin-top: .5em;
    }
    .hint {
      font-size: .8em;
    }
    kbd {
      font: inherit;
      font-size: .85em;
      background: var(--pre-bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0 .3em;
    }

    /* Tab strip selecting which IR stage shows in the output CM6 view
       below. Tabs are disabled until the matching section lands in
       `sectionCache`; the active tab sits flush with its CM6 body so the
       border reads as one continuous surface. */
    .output-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: .2em;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0;
    }
    .tab {
      background: none;
      border: 1px solid transparent;
      border-bottom: none;
      color: var(--muted);
      font: inherit;
      font-size: .8em;
      padding: .3em .7em;
      cursor: pointer;
      border-radius: 4px 4px 0 0;
    }
    .tab:hover:not(:disabled) { color: var(--fg); }
    .tab.active {
      background: var(--pre-bg);
      color: var(--fg);
      border-color: var(--border);
      margin-bottom: -1px;
    }
    .tab:disabled { opacity: .4; cursor: not-allowed; }

    /* Verdict + diagnostics live under the source editor in the left
       pane. Capped height with internal scroll so a long rustc dump
       doesn't squeeze the editor; collapses to zero when no run has
       produced a verdict yet (so the source fills the whole pane). */
    #parse-meta {
      max-height: 10em;
      overflow-y: auto;
    }
    #parse-meta:not(:empty) { margin-top: .6em; }

    .verdict {
      padding: .5em .8em;
      border-radius: 6px;
      margin-bottom: .4em;
    }
    .verdict.ok {
      background: var(--ok-bg);
      border: 1px solid var(--ok-border);
    }
    .verdict.bad {
      background: var(--bad-bg);
      border: 1px solid var(--bad-border);
    }
    .verdict-status { font-size: 1rem; font-weight: bold; }
    .verdict-status.ok { color: var(--ok-fg); }
    .verdict-status.bad { color: var(--bad-fg); }
    .verdict-detail {
      font-size: .82em;
      margin-top: .3em;
      color: var(--muted);
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

  <header>
    <h1><a href="https://github.com/ShawnZhong/verus-explorer" target="_blank" rel="noopener">verus-explorer</a></h1>
    <p class="muted">Verus → HIR → VIR → AIR → Z3 pipeline, running as wasm in your browser.</p>
  </header>

  <main id="workbench">
    <section class="pane" id="left-pane">
      <div class="pane-header">
        <span class="pane-label">Source</span>
        <label class="hint muted">
          Example:
          <select id="example-select">
            <option value="">— load —</option>
            <option value="sequence">Sequence (passes)</option>
            <option value="failure">Assertion failure</option>
            <option value="arith">Arithmetic proof</option>
          </select>
        </label>
      </div>
      <div id="parse-input"></div>
      <div id="parse-meta"></div>
      <div class="controls">
        <button id="parse-run" disabled>Loading verifier…</button>
        <label class="hint muted" title="Re-verify 800ms after each edit">
          <input type="checkbox" id="auto-verify" /> Auto-verify
        </label>
        <span class="muted hint"><kbd>⌘</kbd>+<kbd>Enter</kbd> to verify</span>
      </div>
    </section>

    <section class="pane" id="right-pane">
      <div class="output-tabs" id="parse-tabs" role="tablist"></div>
      <div id="parse-output-view"></div>
    </section>
  </main>

  <!-- Example payloads. Not rendered; read by JS on dropdown change. The
       `sequence` one doubles as the default first-load content when there's
       no URL hash to hydrate from. Kept as `<script type="text/plain">` so
       the source stays human-readable in the HTML. -->
  <script id="example-sequence" type="text/plain">use vstd::prelude::*;

verus! {

// Seq<int> is vstd's specification-level sequence. The verifier knows
// the semantics of empty / push / len / indexing, so every `assert`
// below is discharged automatically via the SMT encoding.
fn main() {
    proof {
        let s: Seq<int> = Seq::empty().push(1).push(2).push(3);
        assert(s.len() == 3);
        assert(s[0] == 1);
        assert(s[1] == 2);
        assert(s[2] == 3);
        assert(s.push(4).len() == 4);
        assert(s.push(4)[3] == 4);
        assert(forall|i: int| 0 <= i < s.len() ==> s.push(4)[i] == s[i]);
    }
}

} // verus!
</script>
  <script id="example-failure" type="text/plain">use vstd::prelude::*;

// Deliberate verification failure: the assertion is unconditionally
// false, so Z3 returns `sat` and the pipeline emits a failed query.
// Useful for seeing what the diagnostic + VERDICT paths look like.
verus! {

fn main() {
    proof {
        assert(false);
    }
}

} // verus!
</script>
  <script id="example-arith" type="text/plain">use vstd::prelude::*;

// Specification-level integer arithmetic (`int`, not `i32`). Outside of
// spec context the literals would infer as `i32` and trip E0308.
verus! {

fn main() {
    proof {
        let x: int = 10;
        assert(x * x == 100);
        assert(x + x == 20);
        assert(x * (x - 1) == 90);
        assert(forall|k: int| k > 0 ==> k * x > 0);
    }
}

} // verus!
</script>

  <!-- Emscripten MODULARIZE output: defines globalThis.initZ3(config).
       Lives under ./z3/ so wasm-pack's post-build wasm-opt pass (which
       scans every top-level *.wasm in its --out-dir) doesn't try to
       re-optimize z3.wasm and abort on its exception-handling tags. -->
  <script src="./z3/z3.js"></script>

  <script type="module">
    // CodeMirror 6 bundle, built by `make dev` (see the `$(DIST)/editor.js`
    // Makefile target). All CM6 imports flow through this one file; the
    // export list lives in `public/editor-src.js`.
    import {
      EditorView, basicSetup, keymap, indentWithTab, rust, oneDark,
      Decoration, StateField, StateEffect, EditorState,
    } from './editor.js';

    // wasm-libs bundle: rustc-in-wasm resolves `extern crate core/alloc/vstd`
    // against rmetas laid out at `/virtual/lib/rustlib/wasm32-unknown-unknown/lib`.
    // `build.rs` stages each file gzipped as `${name}.gz` under `./wasm-libs/`;
    // we fetch each `.gz` and pipe through the native `DecompressionStream`
    // (gzip is supported in all evergreen browsers; brotli isn't yet), then
    // re-install into every fresh wasm instance via `wasm_libs_add_file` +
    // `wasm_libs_finalize`. The names below are the uncompressed filenames
    // rustc's crate locator expects in memory, *not* what's on the wire.
    const WASM_LIBS = [
      'liballoc.rmeta',
      'libcompiler_builtins.rmeta',
      'libcore.rmeta',
      'libverus_builtin.rmeta',
      'libverus_builtin_macros.rmeta',
      'libverus_state_machines_macros.rmeta',
      'libvstd.rmeta',
      'vstd.vir',
    ];

    // Z3 init, the verus wasm compile, and the wasm-libs fetch+decompress
    // are independent; fire them all off at once. Critical cold-load time
    // = max(them), not sum. Emscripten resolves z3.wasm relative to z3.js
    // by default, so no locateFile callback is needed.
    const ms = (t) => `${(performance.now() - t).toFixed(0)}ms`;
    const coldStart = performance.now();
    const timed = (label, p) => {
      const t = performance.now();
      return p.then(v => { console.log(`[cold] ${label}: ${ms(t)}`); return v; });
    };
    const [Z3, verusModule, wasmLibs] = await Promise.all([
      timed('initZ3', globalThis.initZ3()),
      timed('compile verus', WebAssembly.compileStreaming(fetch('./verus_explorer_bg.wasm'))),
      timed('fetch+decompress wasm-libs', Promise.all(WASM_LIBS.map(async name => {
        const res = await fetch(`./wasm-libs/${name}.gz`);
        const stream = res.body.pipeThrough(new DecompressionStream('gzip'));
        const buf = await new Response(stream).arrayBuffer();
        return [name, new Uint8Array(buf)];
      }))),
    ]);
    console.log(`[cold] total: ${ms(coldStart)} (wasm-libs uncompressed = ${(wasmLibs.reduce((s, [,b]) => s + b.byteLength, 0) / 1e6).toFixed(1)} MB)`);

    // Bridge Rust <-> emscripten Z3: air/src/smt_process.rs declares these as
    // wasm-bindgen externs, so each must be a plain JS function on globalThis.
    globalThis.Z3_mk_config = Z3.cwrap('Z3_mk_config', 'number', []);
    globalThis.Z3_mk_context = Z3.cwrap('Z3_mk_context', 'number', ['number']);
    globalThis.Z3_del_config = Z3.cwrap('Z3_del_config', null, ['number']);
    globalThis.Z3_eval_smtlib2_string = Z3.cwrap('Z3_eval_smtlib2_string', 'string', ['number', 'string']);
    globalThis.Z3_del_context = Z3.cwrap('Z3_del_context', null, ['number']);

    // One wasm instance, reused for every `parse_source` call. Each
    // `run_compiler` builds its own Session+CStore; nothing leaks across
    // calls (confirmed by `tests/smoke.rs`). V8 JIT + rustc LazyLock entries
    // survive across calls and amortize, so #2/#3 run at ~2× #1 speed.
    const t0 = performance.now();
    const verus = await import('./verus_explorer.js');
    const t1 = performance.now();
    await verus.default({ module_or_path: verusModule });
    const t2 = performance.now();
    for (const [name, bytes] of wasmLibs) verus.wasm_libs_add_file(name, bytes);
    const t3 = performance.now();
    verus.wasm_libs_finalize();
    const t4 = performance.now();
    console.log(
      `[init] import=${(t1 - t0).toFixed(0)}ms ` +
      `instantiate=${(t2 - t1).toFixed(0)}ms ` +
      `add_file×${wasmLibs.length}=${(t3 - t2).toFixed(0)}ms ` +
      `finalize=${(t4 - t3).toFixed(0)}ms ` +
      `total=${(t4 - t0).toFixed(0)}ms`
    );

    // ------------------------------------------------------------------
    // DOM refs + tiny state
    // ------------------------------------------------------------------
    const parseButton = document.getElementById('parse-run');
    const parseMeta = document.getElementById('parse-meta');
    const parseTabsEl = document.getElementById('parse-tabs');
    const parseOutputViewEl = document.getElementById('parse-output-view');
    const exampleSelect = document.getElementById('example-select');
    const autoVerifyCheckbox = document.getElementById('auto-verify');
    const SECTION_ORDER = ['AST', 'HIR', 'VIR', 'AIR_INITIAL', 'AIR_MIDDLE', 'AIR_FINAL', 'SMT'];
    // AIR has three pipeline-stage variants; subscripts keep the tab strip
    // tight and reflect pipeline order (initial → middle → final).
    const SECTION_LABEL = {
      AST: 'AST', HIR: 'HIR', VIR: 'VIR',
      AIR_INITIAL: 'AIR₁', AIR_MIDDLE: 'AIR₂', AIR_FINAL: 'AIR₃',
      SMT: 'SMT',
    };

    // `parse_source` always produces every IR; bodies are cached here so
    // flipping a tab just swaps the output-view's doc instead of re-parsing.
    const sectionCache = new Map();
    let verdictCache = null;
    const diagnosticCache = [];
    // Which IR the output view currently shows; preserved across runParse
    // calls so the user doesn't lose their tab selection on every edit.
    // Null until the first successful parse; `renderTabs` picks a default.
    let currentTab = null;
    // Per-tab scroll position for the output viewer, so flipping between
    // tabs (or re-running verification on the same tab) returns to where
    // the user was reading. Kept live by a `scroll` listener on the
    // viewer's scrollDOM, below; restored in `renderOutputView`.
    const tabScrolls = new Map();

    // ------------------------------------------------------------------
    // Error-line decoration in the source editor. A StateField holds a
    // RangeSet of `Decoration.line({ class: 'cm-error-line' })` positions;
    // `setErrorLines` rebuilds it on every parse so stale marks from a
    // prior run clear before new ones land. `decoration.map(tr.changes)`
    // keeps existing marks following edits until the next parse refreshes.
    // ------------------------------------------------------------------
    const setErrorLines = StateEffect.define();
    const errorLineField = StateField.define({
      create: () => Decoration.none,
      update(deco, tr) {
        deco = deco.map(tr.changes);
        for (const e of tr.effects) {
          if (e.is(setErrorLines)) deco = Decoration.set(e.value, true);
        }
        return deco;
      },
      provide: f => EditorView.decorations.from(f),
    });
    const errorLineDeco = Decoration.line({ attributes: { class: 'cm-error-line' } });

    // ------------------------------------------------------------------
    // Renderers
    // ------------------------------------------------------------------
    // Pull a `line:col` out of a rustc diagnostic so we can make it clickable
    // *and* surface it as a source-editor line mark. The `--> file:N:M` form
    // is rustc's canonical span marker; fallback to any `N:M` occurrence
    // covers formats that don't carry an arrow (e.g., Verus-side errors).
    // Only the first match is used.
    const extractLoc = (msg) => {
      const m = msg.match(/-->\s*\S*?:(\d+):(\d+)/) ?? msg.match(/:(\d+):(\d+)/);
      return m ? { line: parseInt(m[1], 10), col: parseInt(m[2], 10) } : null;
    };

    const jumpTo = (line, col) => {
      const doc = view.state.doc;
      if (line < 1 || line > doc.lines) return;
      const lineInfo = doc.line(line);
      const anchor = Math.min(lineInfo.from + Math.max(0, col - 1), lineInfo.to);
      view.dispatch({ selection: { anchor }, scrollIntoView: true });
      view.focus();
    };

    const renderMeta = () => {
      parseMeta.textContent = '';
      if (verdictCache !== null) {
        // First line is the headline ("Valid" / "N/M queries failed" /
        // "no queries"); rest is per-query detail.
        const [headline, ...rest] = verdictCache.split('\n');
        const isOk = headline === 'Valid';
        const div = document.createElement('div');
        div.className = `verdict ${isOk ? 'ok' : 'bad'}`;
        const status = document.createElement('div');
        status.className = `verdict-status ${isOk ? 'ok' : 'bad'}`;
        status.textContent = isOk ? '✓ Valid' : `✗ ${headline}`;
        div.appendChild(status);
        const detail = rest.join('\n').trim();
        if (detail) {
          const d = document.createElement('div');
          d.className = 'verdict-detail';
          d.textContent = detail;
          div.appendChild(d);
        }
        parseMeta.appendChild(div);
      }
      for (const msg of diagnosticCache) {
        const pre = document.createElement('pre');
        pre.className = 'diagnostic';
        pre.textContent = msg;
        const loc = extractLoc(msg);
        if (loc) {
          pre.classList.add('clickable');
          pre.title = `Jump to ${loc.line}:${loc.col}`;
          pre.addEventListener('click', () => jumpTo(loc.line, loc.col));
        }
        parseMeta.appendChild(pre);
      }
    };

    // Tab strip. Sections not yet cached render as disabled buttons so the
    // full pipeline shape stays visible during cold load / between runs.
    const renderTabs = () => {
      parseTabsEl.textContent = '';
      for (const name of SECTION_ORDER) {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'tab' + (name === currentTab ? ' active' : '');
        button.textContent = SECTION_LABEL[name];
        button.disabled = !sectionCache.has(name);
        button.addEventListener('click', () => {
          currentTab = name;
          renderTabs();
          renderOutputView();
        });
        parseTabsEl.appendChild(button);
      }
    };

    // Replace the read-only CM6 viewer's doc with the selected section body,
    // then restore the user's last scroll position for that tab (0 on first
    // visit). One long-lived view is cheaper than N-per-tab; the scroll map
    // is what buys back the "pick up where I left off" feel.
    const renderOutputView = () => {
      const body = currentTab && sectionCache.has(currentTab)
        ? sectionCache.get(currentTab) : '';
      outputView.dispatch({
        changes: { from: 0, to: outputView.state.doc.length, insert: body },
      });
      outputView.scrollDOM.scrollTop = tabScrolls.get(currentTab) ?? 0;
    };

    // Convert diagnostic locations into line decorations on the source
    // editor. Called post-parse so marks reflect the latest run; an edit
    // afterwards leaves them in place (mapped through the change) until
    // the next parse refreshes them.
    const updateErrorDecorations = () => {
      const decos = [];
      const doc = view.state.doc;
      for (const msg of diagnosticCache) {
        const loc = extractLoc(msg);
        if (!loc || loc.line < 1 || loc.line > doc.lines) continue;
        decos.push(errorLineDeco.range(doc.line(loc.line).from));
      }
      view.dispatch({ effects: setErrorLines.of(decos) });
    };

    // ------------------------------------------------------------------
    // Rust → JS bridge. Synchronous during `parse_source`; JS is
    // single-threaded, so the DOM won't actually repaint between these
    // calls. On a mid-pipeline trap the buffered caches survive the
    // unwind and `finally`-time renderers flush what's there.
    // ------------------------------------------------------------------
    globalThis.verus_diagnostic = (msg) => { diagnosticCache.push(msg); };
    globalThis.verus_dump = (section, body) => {
      if (section === 'VERDICT') verdictCache = body;
      else sectionCache.set(section, body);
    };
    globalThis.verus_bench = (label, ms) => {
      console.log(`[stage] ${label}=${ms.toFixed(0)}ms`);
    };

    let runId = 0;
    const runParse = () => {
      const myRun = ++runId;
      parseButton.disabled = true;
      parseButton.textContent = 'Verifying…';
      sectionCache.clear();
      verdictCache = null;
      diagnosticCache.length = 0;
      try {
        const tParse = performance.now();
        verus.parse_source(view.state.doc.toString());
        console.log(`[parse] parse_source=${(performance.now() - tParse).toFixed(0)}ms`);
      } catch (e) {
        if (myRun !== runId) return;
        if (diagnosticCache.length === 0 && sectionCache.size === 0 && verdictCache === null) {
          diagnosticCache.push('Parse crashed: ' + (e?.message ?? e));
          console.error(e);
        }
      } finally {
        if (myRun === runId) {
          parseButton.disabled = false;
          parseButton.textContent = 'Verify';
        }
      }
      // Preserve user's tab selection when it survives the new run;
      // otherwise default to VIR (first "interesting" IR) or whichever
      // stage made it the furthest.
      if (!currentTab || !sectionCache.has(currentTab)) {
        currentTab = sectionCache.has('VIR') ? 'VIR'
          : (SECTION_ORDER.find(n => sectionCache.has(n)) ?? null);
      }
      renderMeta();
      renderTabs();
      renderOutputView();
      updateErrorDecorations();
    };

    // ------------------------------------------------------------------
    // URL hash persistence: gzip + base64url-encode the doc into
    // `location.hash` so a link captures the current source. Debounced at
    // 500ms so fast typing doesn't thrash `history.replaceState`.
    // CompressionStream is Safari 16.4+ / Chrome 80+ / Firefox 113+.
    // ------------------------------------------------------------------
    const b64urlEncode = (bytes) => {
      let s = '';
      for (const b of bytes) s += String.fromCharCode(b);
      return btoa(s).replaceAll('+', '-').replaceAll('/', '_').replace(/=+$/, '');
    };
    const b64urlDecode = (str) => {
      const padded = str.replaceAll('-', '+').replaceAll('_', '/')
        + '='.repeat((4 - str.length % 4) % 4);
      const bin = atob(padded);
      const out = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
      return out;
    };
    const encodeSrc = async (src) => {
      const bytes = new TextEncoder().encode(src);
      const stream = new Blob([bytes]).stream().pipeThrough(new CompressionStream('gzip'));
      const compressed = new Uint8Array(await new Response(stream).arrayBuffer());
      return b64urlEncode(compressed);
    };
    const decodeSrc = async (hash) => {
      const stream = new Blob([b64urlDecode(hash)]).stream().pipeThrough(new DecompressionStream('gzip'));
      return await new Response(stream).text();
    };
    let saveTimer;
    const scheduleHashSave = () => {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(async () => {
        try {
          const encoded = await encodeSrc(view.state.doc.toString());
          history.replaceState(null, '', '#' + encoded);
        } catch (e) { console.warn('hash save failed:', e); }
      }, 500);
    };

    const initialDoc = await (async () => {
      const hash = location.hash.slice(1);
      if (hash) {
        try { return await decodeSrc(hash); }
        catch (e) { console.warn('hash decode failed:', e); }
      }
      return document.getElementById('example-sequence').textContent;
    })();

    // ------------------------------------------------------------------
    // Auto-verify: debounced re-run on edits when the checkbox is on.
    // Setting is persisted in localStorage so the preference survives a
    // reload. 800ms feels long enough that fast typing doesn't burn
    // verifier cycles but short enough that a brief pause fires a check.
    // ------------------------------------------------------------------
    const AUTO_VERIFY_KEY = 've-auto-verify';
    // Default on — unchecked only if the user has explicitly turned it off.
    autoVerifyCheckbox.checked = localStorage.getItem(AUTO_VERIFY_KEY) !== 'false';
    autoVerifyCheckbox.addEventListener('change', () => {
      localStorage.setItem(AUTO_VERIFY_KEY, autoVerifyCheckbox.checked);
    });
    let autoVerifyTimer;
    const scheduleAutoVerify = () => {
      clearTimeout(autoVerifyTimer);
      if (!autoVerifyCheckbox.checked) return;
      autoVerifyTimer = setTimeout(runParse, 800);
    };

    // ------------------------------------------------------------------
    // CM6 source editor. Mounted after runParse is defined so the
    // Mod-Enter keymap's closure resolves cleanly. `oneDark` only applied
    // when the user's system is in dark mode; everything else keys off
    // CSS vars.
    // ------------------------------------------------------------------
    const dark = matchMedia('(prefers-color-scheme: dark)').matches;
    const view = new EditorView({
      parent: document.getElementById('parse-input'),
      doc: initialDoc,
      extensions: [
        basicSetup,
        rust(),
        ...(dark ? [oneDark] : []),
        errorLineField,
        EditorView.updateListener.of(u => {
          if (u.docChanged) { scheduleHashSave(); scheduleAutoVerify(); }
        }),
        keymap.of([
          indentWithTab,
          { key: 'Mod-Enter', run: () => { runParse(); return true; } },
        ]),
      ],
    });

    // Second CM6 instance, read-only, hosts the selected IR stage's
    // output. `basicSetup` gets us line numbers + folding + search for
    // free, which matters when the SMT stage dump runs to thousands of
    // lines. No language extension: the IR formats don't map cleanly to
    // any built-in highlighter, so we treat them as plain monospace text.
    const outputView = new EditorView({
      parent: parseOutputViewEl,
      doc: '',
      extensions: [
        basicSetup,
        EditorState.readOnly.of(true),
        EditorView.editable.of(false),
        ...(dark ? [oneDark] : []),
      ],
    });
    // Keep `tabScrolls` in sync with live user scrolling. Fires on our
    // own programmatic `scrollTop = …` too, which just re-saves the value
    // we just wrote — idempotent, so no guard flag needed.
    outputView.scrollDOM.addEventListener('scroll', () => {
      if (currentTab) tabScrolls.set(currentTab, outputView.scrollDOM.scrollTop);
    });

    // ------------------------------------------------------------------
    // Wiring: example dropdown + Verify button.
    // ------------------------------------------------------------------
    exampleSelect.addEventListener('change', () => {
      const val = exampleSelect.value;
      if (!val) return;
      const src = document.getElementById(`example-${val}`).textContent;
      view.dispatch({ changes: { from: 0, to: view.state.doc.length, insert: src } });
      exampleSelect.value = '';
      runParse();
    });
    parseButton.addEventListener('click', runParse);

    // Cold-load done — flip the Verify button live.
    parseButton.textContent = 'Verify';
    parseButton.disabled = false;

    renderTabs();
    runParse();
  </script>

</body>

</html>
